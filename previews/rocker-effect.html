<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rocker effect — variants</title>
    <style>
      :root {
        --accent: #4cc2ff;
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.786);
        --divider: rgba(255, 255, 255, 0.0931);
        --radius: 8px;
        --card-bg: linear-gradient(145deg, #2e2e32 0%, #222226 45%, #16161a 100%);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #0e0e10;
        color: var(--text);
        font-family: "Segoe UI Variable Text", "Segoe UI", system-ui, -apple-system, sans-serif;
      }
      h1 {
        font-size: 20px;
        font-weight: 600;
        margin: 0 0 4px;
      }
      .sub {
        color: var(--muted);
        font-size: 13px;
        margin: 0 0 28px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, max-content);
        gap: 30px 48px;
        align-items: start;
      }
      .variant h2 {
        font-size: 15px;
        font-weight: 600;
        margin: 0 0 2px;
      }
      .variant p {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
        margin: 0 0 14px;
        max-width: 240px;
        min-height: 50px;
      }
      .pair {
        display: flex;
        gap: 22px;
      }
      .slot {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      .slot > span {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--muted);
      }

      /* ---- Simplified light card ---- */
      .card {
        position: relative;
        width: 132px;
        height: 150px;
        border-radius: var(--radius);
        background: var(--card-bg);
        border: 1px solid var(--divider);
        color: var(--text);
        overflow: hidden;
        isolation: isolate;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 14px 12px;
      }
      .card .name {
        position: relative;
        z-index: 1;
        font-size: 14px;
        font-weight: 500;
      }
      .card .icon {
        position: relative;
        z-index: 4;
        width: 34px;
        height: 34px;
        color: var(--muted);
        transition: color 0.2s ease;
      }
      .card .state {
        position: relative;
        z-index: 1;
        font-size: 12px;
        color: var(--muted);
      }
      .card.on .icon {
        color: var(--accent);
      }
      /* brightness indicator bar (left edge) */
      .bar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        z-index: 0;
        background: rgba(255, 255, 255, 0.1);
      }
      .bar-fill {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 0;
        background: var(--accent);
        transition: height 0.2s ease;
      }
      .card.on .bar-fill {
        height: 62%;
      }

      /* ---- Rocker overlay (used by variants 1 & 2) ---- */
      .rocker {
        position: absolute;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        border-radius: inherit;
      }
      .rocker.grad,
      .card.on .rocker.grad-on {
      }

      /* Variant 1: original (gradient bevel only) */
      .v1 .rocker {
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.1) 0%,
          rgba(255, 255, 255, 0.03) 22%,
          rgba(255, 255, 255, 0) 44%,
          rgba(0, 0, 0, 0.05) 48%,
          rgba(0, 0, 0, 0.2) 50%,
          rgba(0, 0, 0, 0.1) 55%,
          rgba(0, 0, 0, 0.03) 64%,
          rgba(0, 0, 0, 0) 75%
        );
      }
      .v1.on .rocker {
        background: linear-gradient(
          to top,
          rgba(255, 255, 255, 0.1) 0%,
          rgba(255, 255, 255, 0.03) 22%,
          rgba(255, 255, 255, 0) 44%,
          rgba(0, 0, 0, 0.05) 48%,
          rgba(0, 0, 0, 0.2) 50%,
          rgba(0, 0, 0, 0.1) 55%,
          rgba(0, 0, 0, 0.03) 64%,
          rgba(0, 0, 0, 0) 75%
        );
      }

      /* Variant 2: current (gradient bevel + neumorphic inset shadows) */
      .v2 .rocker {
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.1) 0%,
          rgba(255, 255, 255, 0.03) 22%,
          rgba(255, 255, 255, 0) 44%,
          rgba(0, 0, 0, 0.05) 48%,
          rgba(0, 0, 0, 0.2) 50%,
          rgba(0, 0, 0, 0.1) 55%,
          rgba(0, 0, 0, 0.03) 64%,
          rgba(0, 0, 0, 0) 75%
        );
        box-shadow:
          inset 0 18px 22px -20px rgba(255, 255, 255, 0.5),
          inset 0 -26px 26px -24px rgba(0, 0, 0, 0.42);
      }
      .v2.on .rocker {
        background: linear-gradient(
          to top,
          rgba(255, 255, 255, 0.1) 0%,
          rgba(255, 255, 255, 0.03) 22%,
          rgba(255, 255, 255, 0) 44%,
          rgba(0, 0, 0, 0.05) 48%,
          rgba(0, 0, 0, 0.2) 50%,
          rgba(0, 0, 0, 0.1) 55%,
          rgba(0, 0, 0, 0.03) 64%,
          rgba(0, 0, 0, 0) 75%
        );
        box-shadow:
          inset 0 -18px 22px -20px rgba(255, 255, 255, 0.5),
          inset 0 26px 26px -24px rgba(0, 0, 0, 0.42);
      }

      /* Variant 3: literal whole-card raised (off) / pressed (on) — stronger */
      .v3 {
        background: linear-gradient(145deg, #41414b 0%, #2d2d34 58%, #232329 100%);
        box-shadow:
          10px 10px 22px rgba(0, 0, 0, 0.62),
          -8px -8px 18px rgba(255, 255, 255, 0.085),
          inset 0 1px 0 rgba(255, 255, 255, 0.16);
      }
      .v3.on {
        background: linear-gradient(145deg, #1a1a1e 0%, #131316 100%);
        box-shadow:
          inset 6px 6px 14px rgba(0, 0, 0, 0.72),
          inset -6px -6px 14px rgba(255, 255, 255, 0.05);
      }

      /* Variant 4: literal whole-card raised / pressed — subtler */
      .v4 {
        background: linear-gradient(145deg, #3a3a41 0%, #2a2a30 100%);
        box-shadow:
          6px 6px 15px rgba(0, 0, 0, 0.46),
          -5px -5px 12px rgba(255, 255, 255, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }
      .v4.on {
        background: linear-gradient(145deg, #1f1f23 0%, #18181b 100%);
        box-shadow:
          inset 4px 4px 10px rgba(0, 0, 0, 0.5),
          inset -3px -3px 8px rgba(255, 255, 255, 0.04);
      }

      /* Variants 5 & 6: two fully-separated rocker paddles (top + bottom). */
      .half {
        position: absolute;
        left: 0;
        right: 0;
        z-index: 0;
        background: linear-gradient(145deg, #34343a 0%, #242428 58%, #1b1b1f 100%);
      }
      .half.top {
        top: 0;
        height: calc(50% - 1.5px);
        border-radius: var(--radius) var(--radius) 3px 3px;
      }
      .half.bottom {
        bottom: 0;
        height: calc(50% - 1.5px);
        border-radius: 3px 3px var(--radius) var(--radius);
      }

      /* v5: split halves — stronger */
      .v5 .half.top,
      .v5.on .half.bottom {
        background: linear-gradient(145deg, #41414b 0%, #2d2d34 58%, #232329 100%);
        box-shadow:
          7px 8px 16px rgba(0, 0, 0, 0.6),
          -3px -3px 9px rgba(255, 255, 255, 0.07),
          inset 0 1px 0 rgba(255, 255, 255, 0.16);
      }
      .v5 .half.bottom,
      .v5.on .half.top {
        background: linear-gradient(145deg, #1a1a1e 0%, #131316 100%);
        box-shadow:
          inset 6px 6px 14px rgba(0, 0, 0, 0.72),
          inset -3px -3px 9px rgba(255, 255, 255, 0.035);
      }

      /* v6: split halves — subtler */
      .v6 .half.top,
      .v6.on .half.bottom {
        background: linear-gradient(145deg, #3a3a41 0%, #2a2a30 100%);
        box-shadow:
          4px 5px 11px rgba(0, 0, 0, 0.45),
          -2px -2px 7px rgba(255, 255, 255, 0.05),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }
      .v6 .half.bottom,
      .v6.on .half.top {
        background: linear-gradient(145deg, #1f1f23 0%, #18181b 100%);
        box-shadow:
          inset 4px 4px 10px rgba(0, 0, 0, 0.5),
          inset -2px -2px 7px rgba(255, 255, 255, 0.04);
      }
    </style>
  </head>
  <body>
    <h1>Rocker effect — visual comparison</h1>
    <p class="sub">Simplified light card (Ted's Style dark surface). Off = top half raised; On = bottom half raised.</p>
    <div class="grid" id="grid"></div>

    <script>
      const BULB =
        "M12,2A7,7 0 0,1 19,9C19,11.38 17.81,13.47 16,14.74V17A1,1 0 0,1 15,18H9A1,1 0 0,1 8,17V14.74C6.19,13.47 5,11.38 5,9A7,7 0 0,1 12,2M9,21V20H15V21A1,1 0 0,1 14,22H10A1,1 0 0,1 9,21Z";

      const variants = [
        {
          cls: "v1",
          type: "overlay",
          title: "1 · Before",
          desc: "Original Decora bevel — a one-sided gradient with a hard crease at the pivot. No depth on the edges.",
        },
        {
          cls: "v2",
          type: "overlay",
          title: "2 · Now (shipped)",
          desc: "Same bevel + soft neumorphic inset shadows: a lit edge on the raised half, a recess on the pressed half.",
        },
        {
          cls: "v3",
          type: "card",
          title: "3 · Whole-card (stronger)",
          desc: "Literal soft-UI: the entire card extrudes when off and sinks in when on (dual-tone shadows).",
        },
        {
          cls: "v4",
          type: "card",
          title: "4 · Whole-card (subtler)",
          desc: "Same whole-card idea with lighter, smaller shadows for a gentler effect.",
        },
        {
          cls: "v5",
          type: "split",
          title: "5 · Split halves (stronger)",
          desc: "Like #3, but the top and bottom are two fully separate paddles with a seam between them — the raised one pops, the other sinks.",
        },
        {
          cls: "v6",
          type: "split",
          title: "6 · Split halves (subtler)",
          desc: "Like #4: two separate paddles, with gentler shadows.",
        },
      ];

      function makeCard(v, on) {
        const card = document.createElement("div");
        card.className = `card ${v.cls}${on ? " on" : ""}`;
        let layers = "";
        if (v.type === "overlay") layers = '<div class="rocker"></div>';
        else if (v.type === "split") layers = '<div class="half top"></div><div class="half bottom"></div>';
        card.innerHTML = `
          ${layers}
          <div class="bar"><div class="bar-fill"></div></div>
          <div class="name">Lamp</div>
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="${BULB}"></path></svg>
          <div class="state">${on ? "62%" : "Off"}</div>
        `;
        return card;
      }

      const grid = document.getElementById("grid");
      for (const v of variants) {
        const col = document.createElement("div");
        col.className = "variant";
        col.innerHTML = `<h2>${v.title}</h2><p>${v.desc}</p>`;
        const pair = document.createElement("div");
        pair.className = "pair";
        for (const on of [false, true]) {
          const slot = document.createElement("div");
          slot.className = "slot";
          slot.innerHTML = `<span>${on ? "On" : "Off"}</span>`;
          slot.appendChild(makeCard(v, on));
          pair.appendChild(slot);
        }
        col.appendChild(pair);
        grid.appendChild(col);
      }
    </script>
  </body>
</html>
